name: Build APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
      - name: Accept licenses
        run: yes | sdkmanager --licenses || true
      - name: Install SDK
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"
      - name: Generate project files
        run: |
          find . -name "*.kt" -delete 2>/dev/null || true
          pip install Pillow -q
          echo "" | base64 -d > generate.py
          python3 generate.py
      - name: Setup Gradle wrapper
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O g.zip
          unzip -q g.zip
          ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew
      - name: Build Debug APK
        run: ./gradlew assembleDebug --stacktrace
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gosloto-6x45-Debug
          path: app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30
