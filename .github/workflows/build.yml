name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Accept licenses
        run: yes | sdkmanager --licenses || true

      - name: Install SDK platform
        run: sdkmanager "platforms;android-34" "build-tools;34.0.0"

      - name: Install Gradle properly
        run: |
          wget -q https://services.gradle.org/distributions/gradle-8.4-bin.zip -O gradle.zip
          unzip -q gradle.zip
          ./gradle-8.4/bin/gradle wrapper --gradle-version 8.4
          chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Rename APK with keywords
        run: |
          cp app/build/outputs/apk/debug/app-debug.apk \
             "Gosloto-6x45-Russia-Lottery-Results-Hot-Cold-Predictions.apk"

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: Gosloto-6x45-Russia-Lottery-Results-Hot-Cold-Predictions
          path: Gosloto-6x45-Russia-Lottery-Results-Hot-Cold-Predictions.apk
          retention-days: 30
